<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原特三等社會行政｜作戰指揮中心 V2</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#fbfaf8;
  --card:#ffffff;
  --text:#2f2b28;
  --muted:#8a8178;
  --line:#e7e3df;
  --accent:#8c7b6e;
}

body{
  margin:0;
  font-family:"Noto Serif TC";
  background:var(--bg);
  color:var(--text);
  line-height:1.7;
}

.container{max-width:1100px;margin:auto;padding:40px 20px;}

header{
  text-align:center;
  margin-bottom:30px;
}

h1{font-weight:500;letter-spacing:2px;}

.callout{
  background:#f3f0ec;
  border:1px solid var(--line);
  padding:15px;
  margin-top:10px;
}

.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:30px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  padding:20px;
  margin-bottom:20px;
}

.title{
  font-weight:600;
  border-left:3px solid var(--accent);
  padding-left:10px;
  margin-bottom:15px;
}

input,select,textarea{
  width:100%;
  padding:10px;
  border:1px solid var(--line);
  background:#faf9f7;
  margin-top:5px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

.progress{
  height:6px;
  background:#eee;
}

.bar{
  height:100%;
  background:var(--accent);
  width:0%;
}

.small{
  font-size:13px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<header>
  <h1>原特三等｜社會行政作戰中心</h1>
  <div class="callout" id="countdown"></div>
</header>

<div class="grid">

<!-- 左側 -->
<div>

<div class="card">
<div class="title">📝 今日讀書紀錄</div>

<select id="subject">
<option>行政法</option>
<option>社會福利政策與法規</option>
<option>社會工作</option>
<option>社會學</option>
<option>原民法規</option>
</select>

<input id="hours" placeholder="學習時數">
<textarea id="summary" placeholder="今日摘要（法條/概念/錯題）"></textarea>

<select id="status">
<option>複習中</option>
<option>已讀完</option>
<option>已精通</option>
</select>

<button onclick="submitData()">送出紀錄</button>
</div>

<div class="card">
<div class="title">🔥 今日錯題</div>
<div id="wrongBox" class="small">載入中...</div>
</div>

<div class="card">
<div class="title">🎯 本週作戰目標</div>
<div class="small">
□ 行政法 §141<br>
□ 行政罰法 §24<br>
□ 長照2.0<br>
□ 社會學理論<br>
□ 原基法整理
</div>
</div>

<div class="card">
<div class="title">☕ 專注音樂</div>
<iframe width="100%" height="200"
src="https://www.youtube.com/embed/jfKfPfyJRdk"
frameborder="0"></iframe>
</div>

</div>

<!-- 右側 -->
<div>

<div class="card">
<div class="title">⚖️ 戰情中心</div>
<div id="dashboard"></div>
</div>

<div class="card">
<div class="title">📊 本週統計</div>
<div id="stats" class="small"></div>
</div>

</div>

</div>
</div>

<script>

const API = "你的GoogleAppsScript網址";

function countdown(){
  const exam = new Date("2026-09-05").getTime();
  const now = new Date().getTime();
  const d = Math.floor((exam-now)/(1000*60*60*24));
  document.getElementById("countdown").innerHTML =
  d>0 ? `🎯 距離考試還有 ${d} 天` : "🔥 考試已到";
}
countdown();

function submitData(){
  const body = new URLSearchParams();
  body.append("subject",subject.value);
  body.append("hours",hours.value);
  body.append("summary",summary.value);
  body.append("status",status.value);

  fetch(API,{method:"POST",body})
  .then(r=>r.json())
  .then(()=>{
    load();
    alert("已送出");
  });
}

function load(){
  fetch(API+"?action=getProgress")
  .then(r=>r.json())
  .then(data=>{
    render(data.subjects);
  });
}

function render(data){
  let html="";
  for(let k in data){
    html+=`
    <div>
      <b>${k}</b><br>
      EXP ${data[k].exp}<br>
      <div class="progress"><div class="bar" style="width:${Math.min(data[k].exp/2,100)}%"></div></div>
      <small>${data[k].latestSummary}</small>
      <br><br>
    </div>`;
  }
  document.getElementById("dashboard").innerHTML=html;
}

load();

</script>

</body>
</html>
