<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原特三等社會行政｜作戰指揮中心 V4</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght=300;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#fbfaf8;
  --card:#ffffff;
  --text:#2f2b28;
  --muted:#8a8178;
  --line:#e7e3df;
  --accent:#8c7b6e;
  --error:#a35d5d;
  --success:#5da373;
}

body{
  margin:0;
  font-family:"Noto Serif TC";
  background:var(--bg);
  color:var(--text);
  font-size: 17px; 
  line-height:1.7;
}

/* 🧭 頂部導覽列樣式 */
.nav-bar {
  background: #2f2b28;
  padding: 10px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.nav-logo {
  color: #fff;
  font-weight: 700;
  letter-spacing: 1px;
}
.nav-links a {
  color: #e7e3df;
  text-decoration: none;
  margin-left: 20px;
  font-size: 15px;
  transition: color 0.3s;
  display: inline-block;
}
.nav-links a:hover, .nav-links a.active {
  color: #c9b097;
  border-bottom: 2px solid #c9b097;
}

.container{max-width:1100px;margin:auto;padding:30px 20px;}

header{
  text-align:center;
  margin-bottom:30px;
}

h1{
  font-weight:500;
  letter-spacing:2px;
  font-size: 32px; 
  margin-top: 10px;
}

.callout{
  background:#f3f0ec;
  border:1px solid var(--line);
  padding:20px;
  margin-top:10px;
  font-size: 20px; 
}

/* 📊 視覺化進度條樣式 */
.progress-container {
  width: 100%;
  background: var(--line);
  border-radius: 8px;
  margin-top: 12px;
  height: 10px;
  position: relative;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--error));
  width: 0%;
  transition: width 1s ease-in-out;
}
.progress-text {
  font-size: 13px;
  color: var(--muted);
  margin-top: 6px;
  text-align: right;
  display: block;
}

/* 🖥️ 預設桌機版雙欄排版 */
.grid{
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:30px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  padding:22px; 
  margin-bottom:20px;
}

.title{
  font-weight:600;
  font-size: 19px; 
  border-left:4px solid var(--accent); 
  padding-left:10px;
  margin-bottom:15px;
}

input,select,textarea{
  width:100%;
  padding:12px; 
  border:1px solid var(--line);
  background:#faf9f7;
  margin-top:5px;
  font-family:"Noto Serif TC";
  font-size: 16px; 
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  border:none;
  background:var(--accent);
  color:white;
  cursor:pointer;
  margin-top:10px;
  font-size: 17px; 
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.small{
  font-size:15px; 
  color:var(--muted);
}

#form-status{
  margin-top:10px;
  font-size:15px; 
  display:none;
}

.youtube-card{
  padding:12px 20px;
}

.youtube-card .title{
  margin-bottom:8px;
  font-size:16px; 
}

/* 🎛️ 音樂高階控制面板 UI */
.custom-audio-panel {
  background: #fdfdfd;
  border: 1px solid var(--line);
  padding: 12px;
  margin-top: 10px;
}
.audio-row-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.audio-info-text {
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 160px;
}
.volume-group {
  display: flex;
  align-items: center;
  gap: 8px;
}
.volume-group span {
  font-size: 13px;
  color: var(--text);
}
.volume-slider {
  width: 80px !important;
  margin-top: 0 !important;
  cursor: pointer;
}

/* 📝 作戰目標動態清單排版 */
.todo-item {
  display: flex;
  align-items: flex-start;
  margin-bottom: 12px; 
  font-size: 16px;
  cursor: pointer;
}
.todo-item input {
  width: auto !important;
  margin-top: 6px !important;
  margin-right: 10px !important;
  transform: scale(1.2);
  cursor: pointer;
}
.todo-text.completed {
  text-decoration: line-through;
  color: var(--muted);
}

.music-control-group {
  margin-top: 10px; 
  display: flex; 
  gap: 6px;
}
.music-control-group input {
  margin-top: 0 !important; 
  padding: 8px 10px !important; 
  font-size: 14px !important; 
  flex: 1 !important;
}
.music-control-group button {
  margin-top: 0 !important; 
  padding: 8px 12px !important; 
  font-size: 14px !important; 
  width: auto !important; 
  white-space: nowrap !important;
}
.playlist-count {
  font-size: 13px;
  color: var(--muted);
  margin-top: 6px;
  text-align: right;
}

/* ==========================================================================
   📱📱📱 響應式斷點設置（智慧型手機與平板電腦優化） 📱📱📱
   ========================================================================== */

/* 📑 平板電腦與中型螢幕優化 (992px 以下) */
@media (max-width: 992px) {
  .grid {
    grid-template-columns: 1.4fr 1fr; 
    gap: 20px;
  }
  h1 {
    font-size: 28px; 
  }
}

/* 📱 智慧型手機與窄螢幕優化 (768px 以下) */
@media (max-width: 768px) {
  .nav-bar {
    flex-direction: column;
    padding: 12px;
    gap: 10px;
  }
  .nav-links {
    display: flex;
    justify-content: center;
    flex-wrap: wrap; 
    gap: 10px;
  }
  .nav-links a {
    margin-left: 0;
    font-size: 14px;
    padding: 2px 4px;
  }
  
  .grid {
    grid-template-columns: 1fr;
    gap: 15px;
  }
  
  .container {
    padding: 15px 10px; 
  }
  
  h1 {
    font-size: 24px;
  }
  
  .callout {
    font-size: 17px;
    padding: 15px;
  }
  
  button, input, select, textarea {
    font-size: 16px;
    padding: 14px 12px; 
  }
  
  .audio-info-text {
    max-width: 120px;
  }
}
</style>
</head>

<body>

<nav class="nav-bar">
  <div class="nav-logo">🏛️ 國考戰情系統</div>
  <div class="nav-links">
    <a href="index.html" class="active">主控面板</a>
    <a href="library.html" target="_blank">法規與題庫</a>
    <a href="https://docs.google.com/spreadsheets/d/1EdDZzI2Pe98d0Z4c5rltDHcH9XWcz0AopuvjtCDWDjs/edit?gid=0#gid=0" target="_blank">📊 讀書計畫記錄表</a>
    <a href="#" onclick="alert('💡 申論模擬訓練頁預留位置')">申論模擬</a>
  </div>
</nav>

<div class="container">

<header>
  <h1>115年原特三等｜社會行政準備紀錄區</h1>
  <div class="callout">
    <div id="countdown"></div>
    <div class="progress-container">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
    <span id="progress-text" class="progress-text">⏳ 戰情精算中...</span>
  </div>
</header>

<div class="grid">

<div>
<div class="card">
<div class="title">📝 今日讀書紀錄</div>

<select id="subject">
<option>行政法</option>
<option>社會福利政策與法規</option>
<option>社會工作</option>
<option>社會學</option>
<option>原民法規</option>
</select>

<input id="hours" type="number" step="0.5" min="0" placeholder="學習時數">
<textarea id="summary" placeholder="今日摘要（法條/概念/錯題）" rows="4"></textarea>

<select id="status">
<option>複習中</option>
<option>已讀完</option>
<option>已精通</option>
</select>

<button id="submit-btn" onclick="submitData()">送出紀錄</button>
<div id="form-status"></div>
</div>

<div class="card">
<div class="title">📌 待複習提醒</div>
<div id="reviewBox" class="small">⏳ 雲端同步中...</div>
</div>
</div>

<div>
<div class="card youtube-card">
<div class="title">☕ 專專注音樂</div>

<div id="focus-music-player"></div>

<div class="custom-audio-panel">
  <div class="audio-row-top">
    <button id="play-pause-btn" onclick="togglePlayState()" style="margin-top:0; width:auto; padding:4px 14px; font-size:13px; background:var(--accent);"> ⏸️ </button>
    <div id="current-track-id" class="audio-info-text">🎵 載入音樂中...</div>
    <div class="volume-group">
      <span>🔈</span>
      <input type="range" class="volume-slider" min="0" max="100" value="30" oninput="adjustVolume(this.value)">
      <span>🔊</span>
    </div>
  </div>
</div>

<div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px;">
  <div id="playlist-info" class="playlist-count">📊 隨機池共 0 首歌</div>
  <button onclick="playRandomKey()" style="margin-top:0; width:auto; padding:5px 12px; font-size:13px; background:#a89a8d;">🎲 隨機換一首</button>
</div>

<div class="music-control-group">
  <input id="music-url" type="text" placeholder="貼上 YouTube 網址擴充隨機歌單...">
  <button onclick="addMusicToPool()" style="background: var(--accent);">➕ 新增</button>
  <button onclick="clearCustomPlaylist()" style="background: var(--error); padding: 8px;">🧹 清空</button>
</div>
</div>

<div class="card">
  <div class="title">🎯 本週作戰目標（6/29–7/05）</div>
  <div id="todo-container" style="padding-left:4px;"></div>
</div>

<div class="card" id="neglect-card" style="display:none;">
<div class="title">⚠️ 科目冷落提醒</div>
<div id="neglectBox" class="small"></div>
</div>

<div class="card">
<div class="title">⚖️ 戰情中心</div>
<div id="dashboard" class="small">⏳ 雲端同步中...</div>
</div>
</div>

</div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const API = "https://script.google.com/macros/s/AKfycbzaeVm6VLLh4xZqrCk7-xk8Dlt-fNaVxBJCDDF8MP3-T38VcZUEFyIlnDvdFzGnLtWF/exec";

// 🟢 改成你專屬的永久大歌單（範例）
const defaultPool = [
  "OS8lnKZdJYc", 
  "5Q2Pc-e-8Qc", 
  "這裡放第三首ID", 
  "這裡放第四首ID", 
  "這裡放第五首ID"
];
let myMusicPool = [];
let ytPlayer = null; 

const defaultTargets = [
  "行政罰法（行政法最後拼圖）：搞懂判斷流程，強攻 §26 刑懲併罰與 §27 時效",
  "身心障礙福利政策：精煉 CRPD 與社會模式，為後續與老人、長照串聯打底",
  "社區工作（社工整合）：與已讀的「生態系統理論、危機介入」融會貫通",
  "全球化（社會學時事）：擺脫古典三大師，直擊「全球化對原民文化衝擊」的申論靈活度",
  "原住民族教育法：完成第一輪全面掃除，並啟動高CP值選擇題戰術"
];

function countdown(){
  const startDate = new Date("2026-01-01").getTime(); 
  const examDate = new Date("2026-09-05").getTime();  
  const nowDate = new Date().getTime();
  
  const d = Math.floor((examDate - nowDate) / (1000 * 60 * 60 * 24));
  document.getElementById("countdown").innerHTML =
  d > 0 ? "🎯 距離考試還有 <span style='font-size: 38px; font-weight: 700; color: var(--error); vertical-align: -2px; margin: 0 4px;'>" + d + "</span> 天" : "🔥 考試已到";

  const totalDuration = examDate - startDate;
  const elapsedDuration = nowDate - startDate;
  let percent = Math.floor((elapsedDuration / totalDuration) * 100);
  
  if (percent < 0) percent = 0;
  if (percent > 100) percent = 100;
  
  document.getElementById("progress-bar").style.width = percent + "%";
  document.getElementById("progress-text").innerText = "⏳ 115年備考時間軸已推進 " + percent + "%";
}

function onYouTubeIframeAPIReady() {
  initMusicCenter(); 
  
  if (myMusicPool.length === 0) return;
  const initialId = myMusicPool[Math.floor(Math.random() * myMusicPool.length)];

  ytPlayer = new YT.Player('focus-music-player', {
    height: '160',
    width: '100%',
    videoId: initialId,
    playerVars: {
      'autoplay': 1,
      'mute': 1,       
      'controls': 1,   
      'rel': 0
    },
    events: {
      'onReady': (event) => {
        document.getElementById("current-track-id").innerText = "🎵 ID: " + initialId;
        ytPlayer.setVolume(30); 
      },
      'onStateChange': onPlayerStateChange
    }
  });
}

function onPlayerStateChange(event) {
  const btn = document.getElementById("play-pause-btn");
  if (event.data === 1) {
    btn.innerText = "⏸️ 暫停";
    btn.style.background = "var(--accent)";
  } else if (event.data === 2) {
    btn.innerText = "▶️ 播放";
    btn.style.background = "var(--success)";
  }
}

function togglePlayState() {
  if (!ytPlayer || typeof ytPlayer.getPlayerState !== 'function') return;
  const state = ytPlayer.getPlayerState();
  if (state === 1) {
    ytPlayer.pauseVideo();
  } else {
    ytPlayer.unMute(); 
    ytPlayer.playVideo();
  }
}

function adjustVolume(value) {
  if (!ytPlayer || typeof ytPlayer.setVolume !== 'function') return;
  ytPlayer.setVolume(value);
  if (value > 0) {
    ytPlayer.unMute(); 
  }
}

function playRandomKey() {
  if (myMusicPool.length === 0) return;
  const randomIndex = Math.floor(Math.random() * myMusicPool.length);
  const selectedId = myMusicPool[randomIndex];
  
  if (ytPlayer && typeof ytPlayer.loadVideoById === 'function') {
    ytPlayer.loadVideoById({
      videoId: selectedId,
      startSeconds: 0
    });
    ytPlayer.unMute();
    ytPlayer.playVideo();
    document.getElementById("current-track-id").innerText = "🎵 ID: " + selectedId;
  }
}

function initMusicCenter() {
  const savedPool = localStorage.getItem("custom_music_pool");
  if (savedPool) {
    try {
      myMusicPool = JSON.parse(savedPool);
      if (!Array.isArray(myMusicPool) || myMusicPool.length === 0) {
        myMusicPool = [...defaultPool];
      }
    } catch(e) {
      myMusicPool = [...defaultPool];
    }
  } else {
    myMusicPool = [...defaultPool];
  }
  localStorage.setItem("custom_music_pool", JSON.stringify(myMusicPool));
  updatePlaylistDOM();
}

function addMusicToPool() {
  const urlField = document.getElementById("music-url");
  let rawUrl = urlField.value.trim();
  
  if (!rawUrl) {
    alert("📌 請先貼上 YouTube 影片網址！");
    return;
  }

  let videoId = "";
  const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
  const match = rawUrl.match(regExp);
  
  if (match && match[2].length === 11) {
    videoId = match[2];
  } else if (rawUrl.includes("v=")) {
    videoId = rawUrl.split("v=")[1].substring(0, 11);
  } else if (rawUrl.includes("youtu.be/")) {
    videoId = rawUrl.split("youtu.be/")[1].substring(0, 11);
  } else if (rawUrl.length === 11) {
    videoId = rawUrl;
  }

  if (videoId && videoId.length === 11) {
    if (myMusicPool.includes(videoId)) {
      alert("💡 這首歌已經在你的隨機抽籤池裡囉！");
      urlField.value = "";
      return;
    }
    
    myMusicPool.push(videoId);
    localStorage.setItem("custom_music_pool", JSON.stringify(myMusicPool));
    updatePlaylistDOM();
    urlField.value = "";
    alert("✨ 成功加入隨機池！目前隨機池共有 " + myMusicPool.length + " 首歌。");
  } else {
    alert("❌ 無法識別網址！請貼上標準單一影片網址。");
  }
}

function updatePlaylistDOM() {
  document.getElementById("playlist-info").innerText = "📊 隨機池共 " + myMusicPool.length + " 首歌";
}

function clearCustomPlaylist() {
  if (confirm("確定要清空自訂歌單並還原成預設的 2 首音樂嗎？")) {
    myMusicPool = [...defaultPool];
    localStorage.setItem("custom_music_pool", JSON.stringify(myMusicPool));
    updatePlaylistDOM();
    playRandomKey();
  }
}

function initTargets() {
  const savedTargets = localStorage.getItem("battle_targets");
  let targetsState = [];
  if (savedTargets) {
    try { targetsState = JSON.parse(savedTargets); } catch(e) { targetsState = []; }
  }
  if (targetsState.length === 0) {
    targetsState = defaultTargets.map(text => ({ text: text, done: false }));
    localStorage.setItem("battle_targets", JSON.stringify(targetsState));
  }
  renderTargets(targetsState);
}

function renderTargets(targets) {
  const container = document.getElementById("todo-container");
  container.innerHTML = "";
  targets.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "todo-item";
    div.onclick = () => toggleTarget(index);
    div.innerHTML = `
      <input type="checkbox" ${item.done ? 'checked' : ''} onclick="event.stopPropagation(); toggleTarget(${index});">
      <span class="todo-text ${item.done ? 'completed' : ''}">${item.text}</span>
    `;
    container.appendChild(div);
  });
}

function toggleTarget(index) {
  const savedTargets = JSON.parse(localStorage.getItem("battle_targets"));
  savedTargets[index].done = !savedTargets[index].done;
  localStorage.setItem("battle_targets", JSON.stringify(savedTargets));
  renderTargets(savedTargets);
}

function submitData(){
  const subject = document.getElementById('subject').value;
  const hours = document.getElementById('hours').value;
  const summary = document.getElementById('summary').value;
  const status = document.getElementById('status').value;
  const submitBtn = document.getElementById('submit-btn');
  const statusDiv = document.getElementById('form-status');

  if(!hours || !summary){
    statusDiv.style.display = "block";
    statusDiv.style.color = "var(--error)";
    statusDiv.innerText = "❌ 請填寫學習時數與摘要";
    return;
  }

  submitBtn.disabled = true;
  submitBtn.innerText = "正在傳送至 Google 與 LINE...";
  statusDiv.style.display = "none";

  const body = new URLSearchParams();
  body.append("subject", subject);
  body.append("hours", hours);
  body.append("summary", summary);
  body.append("status", status);

  fetch(API, {
    method: "POST",
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body.toString()
  })
  .then(r => { if(!r.ok) throw new Error("HTTP 錯誤"); return r.json(); })
  .then(data => {
    statusDiv.style.display = "block";
    if(data && data.status === 'success'){
      statusDiv.style.color = "var(--accent)";
      statusDiv.innerText = "✨ 紀錄成功！進度已同步，LINE 通知已發送。";
      document.getElementById('hours').value = '';
      document.getElementById('summary').value = '';
      load();
    } else {
      statusDiv.style.color = "var(--error)";
      statusDiv.innerText = "❌ 處理失敗";
    }
    submitBtn.disabled = false;
    submitBtn.innerText = "送出紀錄";
  })
  .catch(error => {
    statusDiv.style.display = "block";
    statusDiv.style.color = "var(--error)";
    statusDiv.innerText = "❌ 傳送失敗";
    submitBtn.disabled = false;
    submitBtn.innerText = "送出紀錄";
  });
}

function load(){
  document.getElementById("dashboard").innerHTML = "⏳ 雲端同步中...";
  document.getElementById("reviewBox").innerHTML = "⏳ 雲端同步中...";
  fetch(API + "?action=getProgress")
  .then(r => r.json())
  .then(data => {
    if(data && data.status === 'success' && data.subjects){
      render(data.subjects);
      renderNeglected(data.neglectedSubjects || []);
      renderReviewDue(data.reviewDueSubjects || []);
    }
  })
  .catch(error => {
    document.getElementById("dashboard").innerHTML = "⚠️ 無法連線雲端";
    document.getElementById("reviewBox").innerHTML = "⚠️ 無法連線雲端";
  });
}

function render(data){
  let html = "";
  for(let k in data){
    html += "<div style='margin-bottom:16px;'><b style='font-size:17px;'>" + k + "</b> <span class='small'>共讀 " + data[k].totalHours + " 小時・" + data[k].count + " 次</span><br><span style='font-size:14px; color:var(--text);'>" + data[k].latestSummary + "</span></div>";
  }
  document.getElementById("dashboard").innerHTML = html || "尚無紀錄";
}

function renderNeglected(list){
  const card = document.getElementById("neglect-card");
  const box = document.getElementById("neglectBox");
  if(!list || list.length === 0){ card.style.display = "none"; return; }
  card.style.display = "block";
  let html = "";
  list.forEach(item => {
    const daysText = item.daysSinceLast === null ? "從未開始" : item.daysSinceLast + " 天沒讀了";
    html += "<div style='margin-bottom:8px; font-size:16px;'>🔸 <b>" + item.subject + "</b> " + daysText + "</div>";
  });
  box.innerHTML = html;
}

function renderReviewDue(list){
  const box = document.getElementById("reviewBox");
  if(!list || list.length === 0){ box.innerHTML = "目前沒有待複習的科目，繼續保持！"; return; }
  let html = "";
  list.forEach(item => {
    html += "<div style='margin-bottom:14px; line-height:1.6;'>📌 <b style='font-size:16px;'>" + item.subject + "</b> 已 " + item.daysSinceLast + " 天沒回顧<br><span style='font-size:14px; background:#fffcf7; padding:2px 6px; border:1px dashed var(--line); display:inline-block; margin-top:4px;'>" + item.summary + "</span></div>";
  });
  box.innerHTML = html;
}

countdown();
initTargets();
load();
</script>

</body>
