<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原特三等社會行政｜作戰指揮中心 V2</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#fbfaf8;
  --card:#ffffff;
  --text:#2f2b28;
  --muted:#8a8178;
  --line:#e7e3df;
  --accent:#8c7b6e;
  --error:#a35d5d;
}

body{
  margin:0;
  font-family:"Noto Serif TC";
  background:var(--bg);
  color:var(--text);
  line-height:1.7;
}

.container{max-width:1100px;margin:auto;padding:40px 20px;}

header{
  text-align:center;
  margin-bottom:30px;
}

h1{font-weight:500;letter-spacing:2px;}

.callout{
  background:#f3f0ec;
  border:1px solid var(--line);
  padding:15px;
  margin-top:10px;
}

.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:30px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  padding:20px;
  margin-bottom:20px;
}

.title{
  font-weight:600;
  border-left:3px solid var(--accent);
  padding-left:10px;
  margin-bottom:15px;
}

input,select,textarea{
  width:100%;
  padding:10px;
  border:1px solid var(--line);
  background:#faf9f7;
  margin-top:5px;
  font-family:"Noto Serif TC";
  box-sizing:border-box;
}

button{
  width:100%;
  padding:10px;
  border:none;
  background:var(--accent);
  color:white;
  cursor:pointer;
  margin-top:10px;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.small{
  font-size:13px;
  color:var(--muted);
}

#form-status{
  margin-top:10px;
  font-size:13px;
  display:none;
}

.youtube-card{
  padding:12px 20px;
}

.youtube-card .title{
  margin-bottom:8px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<header>
  <h1>原特三等｜社會行政作戰中心</h1>
  <div class="callout" id="countdown"></div>
</header>

<div class="grid">

<!-- 左側 -->
<div>

<div class="card">
<div class="title">📝 今日讀書紀錄</div>

<select id="subject">
<option>行政法</option>
<option>社會福利政策與法規</option>
<option>社會工作</option>
<option>社會學</option>
<option>原民法規</option>
</select>

<input id="hours" type="number" step="0.5" min="0" placeholder="學習時數">
<textarea id="summary" placeholder="今日摘要（法條/概念/錯題）"></textarea>

<select id="status">
<option>複習中</option>
<option>已讀完</option>
<option>已精通</option>
</select>

<button id="submit-btn" onclick="submitData()">送出紀錄</button>
<div id="form-status"></div>
</div>

<div class="card">
<div class="title">🔥 今日錯題</div>
<div id="wrongBox" class="small">載入中...</div>
</div>

<div class="card">
<div class="title">🎯 本週作戰目標</div>
<div class="small">
□ 行政法 §141<br>
□ 行政罰法 §24<br>
□ 長照2.0<br>
□ 社會學理論<br>
□ 原基法整理
</div>
</div>

</div>

<!-- 右側 -->
<div>

<div class="card youtube-card">
<div class="title">☕ 專注音樂</div>
<iframe width="100%" height="100"
src="https://www.youtube.com/embed/5Q2Pc-e-8Qc"
title="YouTube video player"
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
referrerpolicy="strict-origin-when-cross-origin"
allowfullscreen></iframe>
</div>

<div class="card">
<div class="title">⚖️ 戰情中心</div>
<div id="dashboard" class="small">⏳ 雲端同步中...</div>
</div>

<div class="card">
<div class="title">📊 本週統計</div>
<div id="stats" class="small"></div>
</div>

</div>

</div>
</div>

<script>

// ⚠️ 請換成你「管理部署作業」裡看到的正確網址，結尾必須是 /exec
const API = "https://script.google.com/macros/s/AKfycbwCJz0C9_nuXtjG-ruJe52-A3Ru7iIj3j8jyOWRrLZfte4wUPxhb1eSMKBXmuwAdyYQ/exec";

function countdown(){
  const exam = new Date("2026-09-05").getTime();
  const now = new Date().getTime();
  const d = Math.floor((exam-now)/(1000*60*60*24));
  document.getElementById("countdown").innerHTML =
  d>0 ? `🎯 距離考試還有 ${d} 天` : "🔥 考試已到";
}
countdown();

function submitData(){
  const subject = document.getElementById('subject').value;
  const hours = document.getElementById('hours').value;
  const summary = document.getElementById('summary').value;
  const status = document.getElementById('status').value;
  const submitBtn = document.getElementById('submit-btn');
  const statusDiv = document.getElementById('form-status');

  if(!hours || !summary){
    statusDiv.style.display = "block";
    statusDiv.style.color = "var(--error)";
    statusDiv.innerText = "❌ 請填寫學習時數與摘要";
    return;
  }

  submitBtn.disabled = true;
  submitBtn.innerText = "正在傳送至 Google 與 LINE...";
  statusDiv.style.display = "none";

  const body = new URLSearchParams();
  body.append("subject", subject);
  body.append("hours", hours);
  body.append("summary", summary);
  body.append("status", status);

  fetch(API, {
    method: "POST",
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body.toString()
  })
  .then(r => {
    if(!r.ok) throw new Error(`HTTP 錯誤，狀態碼: ${r.status}`);
    return r.json();
  })
  .then(data => {
    statusDiv.style.display = "block";

    if(data && data.status === 'success'){
      statusDiv.style.color = "var(--accent)";
      statusDiv.innerText = "✨ 紀錄成功！進度已同步，LINE 通知已發送。";
      document.getElementById('hours').value = '';
      document.getElementById('summary').value = '';
      load();
    } else {
      statusDiv.style.color = "var(--error)";
      statusDiv.innerText = "❌ Google 端處理失敗：" + (data && data.message ? data.message : "未知錯誤，請檢查 Apps Script 執行記錄");
    }

    submitBtn.disabled = false;
    submitBtn.innerText = "送出紀錄";
  })
  .catch(error => {
    console.error('Error:', error);
    statusDiv.style.display = "block";
    statusDiv.style.color = "var(--error)";
    statusDiv.innerText = "❌ 傳送失敗：" + error.message + "（請確認 API 網址是否正確）";
    submitBtn.disabled = false;
    submitBtn.innerText = "送出紀錄";
  });
}

function load(){
  document.getElementById("dashboard").innerHTML = "⏳ 雲端同步中...";

  fetch(API + "?action=getProgress")
  .then(r => {
    if(!r.ok) throw new Error(`HTTP 錯誤，狀態碼: ${r.status}`);
    return r.json();
  })
  .then(data => {
    if(data && data.status === 'success' && data.subjects){
      render(data.subjects);
    } else {
      document.getElementById("dashboard").innerHTML = "⚠️ 同步失敗：" + (data && data.message ? data.message : "未知錯誤");
    }
  })
  .catch(error => {
    console.error('讀取雲端進度失敗:', error);
    document.getElementById("dashboard").innerHTML = "⚠️ 無法連線雲端，請檢查網路或 API 設定";
  });
}

function render(data){
  let html = "";
  for(let k in data){
    html += `
    <div style="margin-bottom:14px;">
      <b>${k}</b>　<span class="small">共讀 ${data[k].totalHours} 小時・${data[k].count} 次</span><br>
      <small>${data[k].latestSummary}</small>
    </div>`;
  }
  document.getElementById("dashboard").innerHTML = html || "尚無紀錄";
}

load();

</script>

</body>
</html>
